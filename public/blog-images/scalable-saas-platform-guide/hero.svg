  <text x="600" y="330" font-family="Arial,sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">Node.js  |  Python  |  REST  |  GraphQL</text>
  <!-- Arrow -->
  <line x1="600" y1="354" x2="600" y2="376" stroke="#88C9B3" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="593,376 600,392 607,376" fill="#88C9B3"/>
  <!-- Layer 3: Services -->
  <rect x="200" y="392" width="380" height="80" rx="14" fill="rgba(136,201,179,0.12)" stroke="rgba(136,201,179,0.3)" stroke-width="1.5"/>
