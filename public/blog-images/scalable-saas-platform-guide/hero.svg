  <text x="390" y="448" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">OpenAI  |  Claude  |  ML</text>
  <rect x="620" y="392" width="380" height="80" rx="14" fill="rgba(136,201,179,0.12)" stroke="rgba(136,201,179,0.3)" stroke-width="1.5"/>
