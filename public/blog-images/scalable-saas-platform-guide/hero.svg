      <stop offset="0%" style="stop-color:#1a2421;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1814;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="628" fill="url(#bg5)"/>
