<svg viewBox="0 0 1200 628" xmlns="http://www.w3.org/2000/svg" width="1200" height="628">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2421;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1a16;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#88C9B3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4e7c6e;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="628" fill="url(#bg1)"/>
  <!-- Grid lines -->
  <g opacity="0.06" stroke="#88C9B3" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="314" x2="1200" y2="314"/>
    <line x1="0" y1="471" x2="1200" y2="471"/>
    <line x1="300" y1="0" x2="300" y2="628"/>
    <line x1="600" y1="0" x2="600" y2="628"/>
    <line x1="900" y1="0" x2="900" y2="628"/>
  </g>
  <!-- Glow circle -->
  <circle cx="600" cy="314" r="280" fill="rgba(136,201,179,0.04)"/>
  <circle cx="600" cy="314" r="180" fill="rgba(136,201,179,0.06)"/>
  <!-- Box 1: Your Product -->
  <rect x="80" y="234" width="220" height="160" rx="16" fill="rgba(136,201,179,0.12)" stroke="#88C9B3" stroke-width="1.5"/>
  <text x="190" y="296" font-family="monospace" font-size="13" fill="#88C9B3" text-anchor="middle" opacity="0.7">APP</text>
  <text x="190" y="322" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">Your Product</text>
  <text x="190" y="348" font-family="monospace" font-size="12" fill="#88C9B3" text-anchor="middle" opacity="0.6">React / Node.js</text>
  <!-- Arrow 1 -->
  <line x1="300" y1="314" x2="440" y2="314" stroke="url(#accent1)" stroke-width="2.5" stroke-dasharray="8,4"/>
  <polygon points="440,307 456,314 440,321" fill="#88C9B3"/>
  <!-- Box 2: API Layer -->
  <rect x="460" y="214" width="280" height="200" rx="16" fill="rgba(136,201,179,0.18)" stroke="#88C9B3" stroke-width="2"/>
  <text x="600" y="278" font-family="monospace" font-size="13" fill="#88C9B3" text-anchor="middle" opacity="0.7">REST / SDK</text>
  <text x="600" y="306" font-family="Arial,sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">API Layer</text>
  <text x="600" y="332" font-family="monospace" font-size="12" fill="#88C9B3" text-anchor="middle" opacity="0.6">OpenAI  |  Claude</text>
  <text x="600" y="356" font-family="monospace" font-size="11" fill="#4e7c6e" text-anchor="middle">Authorization + Rate Limits</text>
  <!-- Arrow 2 -->
  <line x1="740" y1="314" x2="880" y2="314" stroke="url(#accent1)" stroke-width="2.5" stroke-dasharray="8,4"/>
  <polygon points="880,307 896,314 880,321" fill="#88C9B3"/>
  <!-- Box 3: AI Model -->
  <rect x="900" y="234" width="220" height="160" rx="16" fill="rgba(136,201,179,0.12)" stroke="#88C9B3" stroke-width="1.5"/>
  <text x="1010" y="296" font-family="monospace" font-size="13" fill="#88C9B3" text-anchor="middle" opacity="0.7">LLM</text>
  <text x="1010" y="322" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">AI Model</text>
  <text x="1010" y="348" font-family="monospace" font-size="12" fill="#88C9B3" text-anchor="middle" opacity="0.6">GPT-4 / Claude 3</text>
  <!-- Title -->
  <text x="600" y="100" font-family="Arial,sans-serif" font-size="32" font-weight="800" fill="#ffffff" text-anchor="middle">OpenAI and Claude API Integration</text>
  <text x="600" y="140" font-family="Arial,sans-serif" font-size="16" fill="#88C9B3" text-anchor="middle" opacity="0.8">A Practical Guide for Product Teams</text>
  <!-- Bottom label -->
  <text x="600" y="580" font-family="Arial,sans-serif" font-size="14" fill="#4e7c6e" text-anchor="middle" opacity="0.7">AI Advocate Holding</text>
</svg>
