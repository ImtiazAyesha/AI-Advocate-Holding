<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#120f0a"/>
      <stop offset="100%" stop-color="#1c1710"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="800" fill="url(#bg5)"/>

  <!-- Dot grid -->
  <pattern id="dots5" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#C9A96E" opacity="0.1"/>
  </pattern>
  <rect width="1200" height="800" fill="url(#dots5)"/>

  <!-- Soft center glow -->
  <ellipse cx="600" cy="380" rx="480" ry="280" fill="#C9A96E" opacity="0.03"/>

  <!-- Document stack — background -->
  <rect x="380" y="240" width="320" height="400" rx="12" fill="#1c1710" stroke="#C9A96E" stroke-width="1" stroke-opacity="0.15" transform="rotate(-4 540 440)"/>
  <rect x="380" y="240" width="320" height="400" rx="12" fill="#1c1710" stroke="#C9A96E" stroke-width="1" stroke-opacity="0.2" transform="rotate(-2 540 440)"/>

  <!-- Main document -->
  <rect x="380" y="200" width="340" height="420" rx="12" fill="#1c1710" stroke="#C9A96E" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="380" y="200" width="340" height="420" rx="12" fill="#C9A96E" opacity="0.02"/>

  <!-- Document header line -->
  <rect x="412" y="236" width="200" height="12" rx="4" fill="#C9A96E" opacity="0.35"/>
  <rect x="412" y="256" width="140" height="8" rx="3" fill="#C9A96E" opacity="0.15"/>

  <!-- Line items with checkmarks -->
  <!-- Row 1 -->
  <rect x="412" y="296" width="200" height="8" rx="3" fill="#ffffff" opacity="0.08"/>
  <circle cx="636" cy="300" r="10" fill="#4ade80" opacity="0.2"/>
  <path d="M 630 300 L 634 304 L 643 295" stroke="#4ade80" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <rect x="412" y="310" width="160" height="6" rx="3" fill="#ffffff" opacity="0.05"/>

  <!-- Row 2 -->
  <rect x="412" y="334" width="200" height="8" rx="3" fill="#ffffff" opacity="0.08"/>
  <circle cx="636" cy="338" r="10" fill="#4ade80" opacity="0.2"/>
  <path d="M 630 338 L 634 342 L 643 333" stroke="#4ade80" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <rect x="412" y="348" width="120" height="6" rx="3" fill="#ffffff" opacity="0.05"/>

  <!-- Row 3 — flagged (amber) -->
  <rect x="412" y="372" width="200" height="8" rx="3" fill="#f59e0b" opacity="0.2"/>
  <circle cx="636" cy="376" r="10" fill="#f59e0b" opacity="0.25"/>
  <text x="636" y="380" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="700" opacity="0.9">!</text>
  <rect x="412" y="386" width="180" height="6" rx="3" fill="#f59e0b" opacity="0.08"/>

  <!-- Row 4 -->
  <rect x="412" y="410" width="200" height="8" rx="3" fill="#ffffff" opacity="0.08"/>
  <circle cx="636" cy="414" r="10" fill="#4ade80" opacity="0.2"/>
  <path d="M 630 414 L 634 418 L 643 409" stroke="#4ade80" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <rect x="412" y="424" width="140" height="6" rx="3" fill="#ffffff" opacity="0.05"/>

  <!-- Row 5 -->
  <rect x="412" y="448" width="200" height="8" rx="3" fill="#ffffff" opacity="0.08"/>
  <circle cx="636" cy="452" r="10" fill="#4ade80" opacity="0.2"/>
  <path d="M 630 452 L 634 456 L 643 447" stroke="#4ade80" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>

  <!-- Recovery amount box -->
  <rect x="412" y="510" width="276" height="70" rx="8" fill="#C9A96E" opacity="0.08" stroke="#C9A96E" stroke-width="1" stroke-opacity="0.3"/>
  <text x="550" y="536" text-anchor="middle" fill="#C9A96E" font-size="11" font-family="system-ui,sans-serif" font-weight="600" opacity="0.5" letter-spacing="1">RECOVERED THIS QUARTER</text>
  <text x="550" y="564" text-anchor="middle" fill="#C9A96E" font-size="24" font-family="system-ui,sans-serif" font-weight="800" opacity="0.85">+15% Revenue</text>

  <!-- Scales icon — right side -->
  <line x1="900" y1="260" x2="900" y2="480" stroke="#C9A96E" stroke-width="2" stroke-opacity="0.25"/>
  <line x1="820" y1="300" x2="980" y2="300" stroke="#C9A96E" stroke-width="2" stroke-opacity="0.25"/>
  <circle cx="820" cy="300" r="60" fill="none" stroke="#C9A96E" stroke-width="1.5" stroke-opacity="0.18"/>
  <circle cx="980" cy="300" r="60" fill="none" stroke="#C9A96E" stroke-width="1.5" stroke-opacity="0.18"/>
  <circle cx="900" cy="480" r="16" fill="#C9A96E" opacity="0.15" stroke="#C9A96E" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Label -->
  <text x="60" y="750" fill="#C9A96E" font-size="15" font-family="system-ui,sans-serif" font-weight="700" opacity="0.45" letter-spacing="3">LEGAL BILLING RECOVERY AI</text>
</svg>
