  <rect x="140" y="425" width="40" height="30" rx="6" fill="none" stroke="#88C9B3" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="146" y1="437" x2="174" y2="437" stroke="#88C9B3" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="146" y1="444" x2="168" y2="444" stroke="#88C9B3" stroke-width="1" stroke-opacity="0.4"/>
