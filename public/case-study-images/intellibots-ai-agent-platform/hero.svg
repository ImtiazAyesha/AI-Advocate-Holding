  <circle cx="1040" cy="440" r="44" fill="#1A2421" stroke="#88C9B3" stroke-width="1.5" stroke-opacity="0.35"/>
  <rect x="1020" y="425" width="40" height="30" rx="6" fill="none" stroke="#88C9B3" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="1026" y1="437" x2="1054" y2="437" stroke="#88C9B3" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="1026" y1="444" x2="1048" y2="444" stroke="#88C9B3" stroke-width="1" stroke-opacity="0.4"/>
  <text x="1040" y="462" text-anchor="middle" fill="#88C9B3" font-size="8" font-family="system-ui,sans-serif" font-weight="600" opacity="0.5">LEARN</text>

  <!-- Bottom left -->
  <circle cx="280" cy="600" r="44" fill="#1A2421" stroke="#88C9B3" stroke-width="1.5" stroke-opacity="0.35"/>
  <rect x="260" y="585" width="40" height="30" rx="6" fill="none" stroke="#88C9B3" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="266" y1="597" x2="294" y2="597" stroke="#88C9B3" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="266" y1="604" x2="288" y2="604" stroke="#88C9B3" stroke-width="1" stroke-opacity="0.4"/>
