  <circle cx="920" cy="600" r="44" fill="#1A2421" stroke="#88C9B3" stroke-width="1.5" stroke-opacity="0.35"/>
  <rect x="900" y="585" width="40" height="30" rx="6" fill="none" stroke="#88C9B3" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="906" y1="597" x2="934" y2="597" stroke="#88C9B3" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="906" y1="604" x2="928" y2="604" stroke="#88C9B3" stroke-width="1" stroke-opacity="0.4"/>
  <text x="920" y="622" text-anchor="middle" fill="#88C9B3" font-size="8" font-family="system-ui,sans-serif" font-weight="600" opacity="0.5">ESCALATE</text>

  <!-- Stat badge -->
  <rect x="490" y="108" width="220" height="52" rx="10" fill="#88C9B3" opacity="0.08" stroke="#88C9B3" stroke-width="1" stroke-opacity="0.3"/>
  <text x="600" y="130" text-anchor="middle" fill="#88C9B3" font-size="18" font-family="system-ui,sans-serif" font-weight="800" opacity="0.85">70% Fewer Tickets</text>
  <text x="600" y="149" text-anchor="middle" fill="#88C9B3" font-size="11" font-family="system-ui,sans-serif" font-weight="500" opacity="0.5">Support handled autonomously</text>

  <!-- Label -->
  <text x="60" y="750" fill="#88C9B3" font-size="15" font-family="system-ui,sans-serif" font-weight="700" opacity="0.5" letter-spacing="3">MULTI-AGENT AI PLATFORM</text>
</svg>
