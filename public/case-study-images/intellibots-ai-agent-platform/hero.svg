  <rect x="940" y="185" width="40" height="30" rx="6" fill="none" stroke="#88C9B3" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="946" y1="197" x2="974" y2="197" stroke="#88C9B3" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="946" y1="204" x2="968" y2="204" stroke="#88C9B3" stroke-width="1" stroke-opacity="0.4"/>
